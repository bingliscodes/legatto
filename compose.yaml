name: legatto  # pin the project name → stable volume names (legatto_pgdata, etc.) regardless of how it's invoked

# Base stack — environment-agnostic. Works anywhere.
# Local:  docker compose up            (auto-merges compose.override.yaml)
# Prod:   docker compose -f compose.yaml -f compose.prod.yaml up -d
services:
  api:
    build: ./backend
    image: legatto-api
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis: service_started

  worker:
    image: legatto-api
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis: service_started
    pull_policy: never

  redis:
    image: redis:7

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: legatto-api
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    pull_policy: never

volumes:
  pgdata:
