# Prod override — layered on top of compose.yaml (NOT auto-loaded; pass it explicitly):
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
# Adds TLS nginx + certbot on top of the base stack.
services:
  nginx:
    image: ghcr.io/bingliscodes/legatto-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro   # TLS config (:80 redirect + :443)
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    depends_on:
      - api
    # reload every 6h so renewed certs are picked up; nginx in foreground as PID 1
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    # renew every 12h (no-op until within 30 days of expiry)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-www:
  certbot-conf:
