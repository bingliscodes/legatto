# HTTP :80 — ACME challenge + redirect everything else to HTTPS
server {
    listen 80;
    server_name legatto.live www.legatto.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — the app
server {
    listen 443 ssl;
    server_name legatto.live www.legatto.live;

    ssl_certificate     /etc/letsencrypt/live/legatto.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/legatto.live/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}