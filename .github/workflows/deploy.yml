name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # amd64; matches the production droplet architecture
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4 # clone repo into the runner

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN}} # auto-provided, no setup

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend # points build-push-action to the folder's Dockerfile
          push: true
          tags: ghcr.io/bingliscodes/legatto-api:latest
      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/bingliscodes/legatto-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.DROPLET_HOST}}
          username: ${{secrets.DROPLET_USER}}
          key: ${{secrets.DROPLET_SSH_KEY}}
          script: |
            cd ~/legatto
            git pull
            docker compose -f compose.yaml -f compose.prod.yaml pull
            docker compose -f compose.yaml -f compose.prod.yaml up -d
