# Local dev override — auto-applied by `docker compose up` (no -f needed).
# Adds an HTTP-only nginx so the full stack runs at http://localhost with no cert.
services:
  nginx:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro   # HTTP-only config
    depends_on:
      - api
